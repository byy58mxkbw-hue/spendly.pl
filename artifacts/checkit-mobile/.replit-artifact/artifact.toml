kind = "mobile"
previewPath = "/mobile/"
title = "CheckIT Mobile"
version = "1.0.0"
id = "artifacts/checkit-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 22182

[services.development]
run = "pnpm --filter @workspace/checkit-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/checkit-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/checkit-mobile", "run", "serve" ]

[services.env]
PORT = "22182"
BASE_PATH = "/mobile/"
