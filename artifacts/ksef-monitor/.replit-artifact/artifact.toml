kind = "web"
previewPath = "/"
title = "Spendly"
version = "1.0.0"
id = "artifacts/ksef-monitor"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22900

[services.development]
run = "pnpm --filter @workspace/ksef-monitor run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ksef-monitor", "run", "build" ]
publicDir = "artifacts/ksef-monitor/dist/public"
serve = "static"
notFoundPage = "404.html"

[[services.production.rewrites]]
from = "/"
to = "/index.html"

[[services.production.rewrites]]
from = "/sign-in"
to = "/sign-in.html"

[[services.production.rewrites]]
from = "/sign-in/*"
to = "/sign-in.html"

[[services.production.rewrites]]
from = "/sign-up"
to = "/sign-up.html"

[[services.production.rewrites]]
from = "/sign-up/*"
to = "/sign-up.html"

[[services.production.rewrites]]
from = "/ksef"
to = "/ksef.html"

[[services.production.rewrites]]
from = "/food-cost"
to = "/food-cost.html"

[[services.production.rewrites]]
from = "/ocr-faktur"
to = "/ocr-faktur.html"

[[services.production.rewrites]]
from = "/cennik"
to = "/cennik.html"

[[services.production.rewrites]]
from = "/clerk/*"
to = "/index.html"

[[services.production.rewrites]]
from = "/dashboard"
to = "/index.html"

[[services.production.rewrites]]
from = "/suppliers"
to = "/index.html"

[[services.production.rewrites]]
from = "/suppliers/*"
to = "/index.html"

[[services.production.rewrites]]
from = "/products"
to = "/index.html"

[[services.production.rewrites]]
from = "/invoices"
to = "/index.html"

[[services.production.rewrites]]
from = "/price-alerts"
to = "/index.html"

[[services.production.rewrites]]
from = "/reports"
to = "/index.html"

[[services.production.rewrites]]
from = "/predictive"
to = "/index.html"

[[services.production.rewrites]]
from = "/pending-invoices"
to = "/index.html"

[[services.production.rewrites]]
from = "/ai-cfo"
to = "/index.html"

[[services.production.rewrites]]
from = "/settings/ksef"
to = "/index.html"

[[services.production.rewrites]]
from = "/settings/cost-centers"
to = "/index.html"

[[services.production.rewrites]]
from = "/admin/users"
to = "/index.html"

[services.env]
PORT = "22900"
BASE_PATH = "/"
