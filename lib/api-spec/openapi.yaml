openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: KSeF Monitor Cen - API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: suppliers
    description: Supplier management
  - name: products
    description: Product management
  - name: invoices
    description: Invoice management
  - name: price-alerts
    description: Price alert management
  - name: dashboard
    description: Dashboard summaries
  - name: reports
    description: Reporting and exports
  - name: ksef
    description: KSeF 2.0 integration (sync, config, pending review)
  - name: insights
    description: AI CFO — automated price insights
  - name: ai-cfo
    description: AI CFO 2.0 — chat, food cost, top insights
  - name: cost-centers
    description: Cost center management
  - name: admin
    description: Admin panel — users, stats, account management

paths:
  /admin/users:
    get:
      operationId: getAdminUsers
      tags: [admin]
      summary: List all users with per-user stats and blocked status
      responses:
        "200":
          description: User list with stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUsersResponse"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get platform-wide aggregated statistics
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStatsResponse"

  /admin/users/{userId}/details:
    get:
      operationId: getAdminUserDetails
      tags: [admin]
      summary: Get data preview for a specific user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserDetails"

  /admin/users/{userId}/block:
    patch:
      operationId: patchAdminUserBlock
      tags: [admin]
      summary: Block or unblock a user account
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                blocked:
                  type: boolean
              required:
                - blocked
      responses:
        "200":
          description: Updated block status
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  blocked:
                    type: boolean
                required:
                  - ok
                  - blocked

  /admin/users/{userId}:
    delete:
      operationId: deleteAdminUser
      tags: [admin]
      summary: Permanently delete a user account
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /insights:
    get:
      operationId: getInsights
      tags: [insights]
      summary: List AI insights for the current user
      responses:
        "200":
          description: List of insights
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AiInsight"

  /insights/generate:
    post:
      operationId: postInsightsGenerate
      tags: [insights]
      summary: Trigger AI insight generation
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Generation result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateInsightsResponse"

  /insights/{id}/read:
    post:
      operationId: postInsightsIdRead
      tags: [insights]
      summary: Mark insight as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  /insights/{id}/dismiss:
    post:
      operationId: postInsightsIdDismiss
      tags: [insights]
      summary: Dismiss an insight
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  /ai-cfo/insights:
    get:
      operationId: getAiCfoInsights
      tags: [ai-cfo]
      summary: Get top 3 AI CFO insight cards (pure SQL, no AI)
      responses:
        "200":
          description: Array of up to 3 insight cards
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AiCfoInsightCard"

  /ai-cfo/chat:
    post:
      operationId: postAiCfoChat
      tags: [ai-cfo]
      summary: Chat with AI CFO — returns a structured mini-report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiCfoChatBody"
      responses:
        "200":
          description: Structured AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiCfoChatResponse"

  /ai-cfo/food-cost:
    post:
      operationId: postAiCfoFoodCost
      tags: [ai-cfo]
      summary: Calculate food cost from menu text + weekly sales
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AiCfoFoodCostBody"
      responses:
        "200":
          description: Food cost analysis table
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiCfoFoodCostResponse"

  /ai-cfo/extract-menu:
    post:
      operationId: postAiCfoExtractMenu
      tags: [ai-cfo]
      summary: Extract menu items and prices from uploaded images or a multi-page PDF (up to 5 files)
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/AiCfoExtractMenuBody"
      responses:
        "200":
          description: Extracted menu text ready to paste into food cost analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiCfoExtractMenuResponse"
        "400":
          description: Bad request (missing fields or unsupported format)
        "422":
          description: Extraction failed (unreadable image or empty PDF)

  /ai-cfo/sessions:
    get:
      operationId: listAiCfoSessions
      tags: [ai-cfo]
      summary: List recent AI CFO chat sessions for the current user
      responses:
        "200":
          description: List of sessions (newest first)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AiCfoSessionSummary"
    post:
      operationId: createAiCfoSession
      tags: [ai-cfo]
      summary: Create a new AI CFO chat session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAiCfoSessionBody"
      responses:
        "201":
          description: Created session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiCfoSessionDetail"

  /ai-cfo/sessions/{id}:
    get:
      operationId: getAiCfoSession
      tags: [ai-cfo]
      summary: Get a single AI CFO session with full message history
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiCfoSessionDetail"
        "404":
          description: Not found
    put:
      operationId: updateAiCfoSession
      tags: [ai-cfo]
      summary: Append messages to an existing AI CFO session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAiCfoSessionBody"
      responses:
        "200":
          description: Updated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AiCfoSessionDetail"
        "404":
          description: Not found
    delete:
      operationId: deleteAiCfoSession
      tags: [ai-cfo]
      summary: Delete an AI CFO session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /cost-centers:
    get:
      operationId: listCostCenters
      tags: [cost-centers]
      summary: List all cost centers for the current user
      responses:
        "200":
          description: List of cost centers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CostCenter"
    post:
      operationId: createCostCenter
      tags: [cost-centers]
      summary: Create a new cost center
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCostCenterBody"
      responses:
        "201":
          description: Created cost center
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostCenter"

  /cost-centers/{id}:
    patch:
      operationId: updateCostCenter
      tags: [cost-centers]
      summary: Update a cost center
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCostCenterBody"
      responses:
        "200":
          description: Updated cost center
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostCenter"
    delete:
      operationId: deleteCostCenter
      tags: [cost-centers]
      summary: Delete a cost center
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                required: [deleted]
                properties:
                  deleted:
                    type: boolean

  /invoices/{id}/cost-center:
    patch:
      operationId: setInvoiceCostCenter
      tags: [cost-centers]
      summary: Assign a cost center to an invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetInvoiceCostCenterBody"
      responses:
        "200":
          description: Updated invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invoice"

  /suppliers/{id}/cost-center-suggestion:
    get:
      operationId: getSupplierCostCenterSuggestion
      tags: [suppliers]
      summary: Get the most common cost center for a supplier based on invoice history (90% heuristic)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Suggested cost center
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierCostCenterSuggestion"
        "404":
          description: Not found

  /suppliers/{id}/default-category:
    patch:
      operationId: setSupplierDefaultCategory
      tags: [suppliers]
      summary: Set the default category for a supplier (all new products from this supplier will be auto-assigned this category)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetSupplierDefaultCategoryBody"
      responses:
        "200":
          description: Updated supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
        "404":
          description: Not found

  /suppliers/{id}/default-cost-center:
    patch:
      operationId: setSupplierDefaultCostCenter
      tags: [cost-centers]
      summary: Set the default cost center for a supplier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetSupplierDefaultCostCenterBody"
      responses:
        "200":
          description: Updated supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"

  /suppliers:
    get:
      operationId: listSuppliers
      tags: [suppliers]
      summary: List all suppliers
      parameters:
        - name: costCenterId
          in: query
          required: false
          schema:
            type: integer
          description: "Filter to suppliers that have invoices in this cost center"
        - name: includeInactive
          in: query
          required: false
          schema:
            type: boolean
          description: "If true, return only inactive (soft-deleted) suppliers"
      responses:
        "200":
          description: List of suppliers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Supplier"
    post:
      operationId: createSupplier
      tags: [suppliers]
      summary: Create a new supplier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupplierBody"
      responses:
        "201":
          description: Created supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"

  /suppliers/{id}:
    get:
      operationId: getSupplier
      tags: [suppliers]
      summary: Get a supplier by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Supplier details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
        "404":
          description: Not found
    put:
      operationId: updateSupplier
      tags: [suppliers]
      summary: Update a supplier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSupplierBody"
      responses:
        "200":
          description: Updated supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
        "404":
          description: Not found
    delete:
      operationId: deleteSupplier
      tags: [suppliers]
      summary: Soft-delete a supplier (sets isActive=false, marks their invoices as excluded)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Soft-deleted
          content:
            application/json:
              schema:
                type: object
                required: [deleted]
                properties:
                  deleted:
                    type: boolean
        "404":
          description: Not found

  /suppliers/{id}/restore:
    post:
      operationId: restoreSupplier
      tags: [suppliers]
      summary: Restore a soft-deleted supplier (sets isActive=true, un-excludes their invoices)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Restored supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
        "404":
          description: Not found

  /suppliers/{id}/monthly-spend:
    get:
      operationId: getSupplierMonthlySpend
      tags: [suppliers]
      summary: Get monthly spend breakdown for a supplier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: months
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 24
          description: "Number of months to include (default 12)"
      responses:
        "200":
          description: Monthly spend data for the supplier
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupplierMonthlySpend"
        "404":
          description: Not found

  /suppliers/{id}/top-products:
    get:
      operationId: getSupplierTopProducts
      tags: [suppliers]
      summary: Get top products purchased from a supplier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 20
          description: "Max number of products to return (default 5)"
      responses:
        "200":
          description: Top products for this supplier
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupplierTopProduct"
        "404":
          description: Not found

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products
      parameters:
        - name: supplierId
          in: query
          required: false
          schema:
            type: integer
        - name: category
          in: query
          required: false
          schema:
            type: string
        - name: days
          in: query
          required: false
          schema:
            type: integer
          description: If set, limits price history to the last N days when computing previousPrice and changePercent
        - name: month
          in: query
          required: false
          schema:
            type: string
          description: "Month in YYYY-MM format (takes priority over days)"
        - name: needsReview
          in: query
          required: false
          schema:
            type: boolean
          description: "If true, return only products that need category review"
        - name: costCenterId
          in: query
          required: false
          schema:
            type: integer
          description: "Filter to products purchased via invoices in this cost center"
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"
    post:
      operationId: createProduct
      tags: [products]
      summary: Create a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductBody"
      responses:
        "201":
          description: Created product
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatedProduct"

  /products/{id}:
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update a product (e.g. its category)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductBody"
      responses:
        "204":
          description: Updated
        "404":
          description: Not found

  /products/{id}/correct-category:
    patch:
      operationId: correctProductCategory
      tags: [products]
      summary: Correct a product's category (user feedback, enables self-learning)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CorrectProductCategoryBody"
      responses:
        "200":
          description: Category corrected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreatedProduct"
        "404":
          description: Not found

  /products/{id}/supplier-comparison:
    get:
      operationId: getProductSupplierComparison
      tags: [products]
      summary: Compare prices across suppliers for a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Supplier comparison data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierComparison"
        "404":
          description: Not found

  /products/{id}/price-history:
    get:
      operationId: getProductPriceHistory
      tags: [products]
      summary: Get price history for a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: supplierId
          in: query
          required: false
          schema:
            type: integer
        - name: months
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Price history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PriceHistoryEntry"

  /categories:
    get:
      operationId: listCategories
      tags: [products]
      summary: List all categories (built-in + user custom)
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryItem"
    post:
      operationId: createCategory
      tags: [products]
      summary: Create a new custom category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryBody"
      responses:
        "201":
          description: Created category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryItem"
        "400":
          description: Validation error

  /categories/{id}:
    patch:
      operationId: updateCategory
      tags: [products]
      summary: Rename a custom category
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCategoryBody"
      responses:
        "200":
          description: Updated category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryItem"
        "400":
          description: Validation error
        "403":
          description: Cannot rename built-in category
        "404":
          description: Category not found
    delete:
      operationId: deleteCategory
      tags: [products]
      summary: Delete a custom category (only user-created categories can be deleted)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "403":
          description: Cannot delete built-in category
        "404":
          description: Category not found

  /products/bulk-verify:
    post:
      operationId: bulkVerifyProducts
      tags: [products]
      summary: Mark multiple products as verified (needsReview = false)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BulkVerifyProductsBody"
      responses:
        "200":
          description: Number of verified products
          content:
            application/json:
              schema:
                type: object
                required: [verifiedCount]
                properties:
                  verifiedCount:
                    type: integer

  /products/top-price-changes:
    get:
      operationId: getTopPriceChanges
      tags: [products]
      summary: Get products with biggest price changes
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: days
          in: query
          required: false
          schema:
            type: integer
        - name: month
          in: query
          required: false
          schema:
            type: string
          description: "Month in YYYY-MM format (takes priority over days)"
        - name: costCenterId
          in: query
          required: false
          schema:
            type: integer
          description: "Filter results to a specific cost center."
      responses:
        "200":
          description: Top price change products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PriceChangeProduct"

  /invoices:
    get:
      operationId: listInvoices
      tags: [invoices]
      summary: List all invoices
      parameters:
        - name: supplierId
          in: query
          required: false
          schema:
            type: integer
        - name: costCenterId
          in: query
          required: false
          description: Filter by cost center id; use 0 to get unassigned invoices
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"

  /invoices/bulk-assign-cost-center:
    patch:
      operationId: bulkAssignCostCenter
      tags: [invoices]
      summary: Assign a cost center to all invoices for the current user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetInvoiceCostCenterBody"
      responses:
        "200":
          description: Number of updated invoices
          content:
            application/json:
              schema:
                type: object
                required: [updated]
                properties:
                  updated:
                    type: integer

  /invoices/delete-all:
    delete:
      operationId: deleteAllInvoices
      tags: [invoices]
      summary: Delete all invoices for the current user
      responses:
        "200":
          description: Number of deleted invoices
          content:
            application/json:
              schema:
                type: object
                required: [deleted]
                properties:
                  deleted:
                    type: integer

  /invoices/scan-receipt:
    post:
      operationId: scanReceipt
      tags: [invoices]
      summary: Scan a receipt or invoice image with OCR (GPT-4o Vision) and extract structured data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanReceiptBody"
      responses:
        "200":
          description: Extracted receipt data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScannedReceiptData"

  /invoices/import:
    post:
      operationId: importInvoice
      tags: [invoices]
      summary: Import invoice from KSeF XML
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportInvoiceBody"
      responses:
        "201":
          description: Imported invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceWithItems"

  /invoices/{id}:
    get:
      operationId: getInvoice
      tags: [invoices]
      summary: Get invoice details with items
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice with line items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceWithItems"
        "404":
          description: Not found
    delete:
      operationId: deleteInvoice
      tags: [invoices]
      summary: Delete an invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /invoices/{invoiceId}/items/{itemId}:
    delete:
      operationId: deleteInvoiceItem
      tags: [invoices]
      summary: Delete a single line item from an invoice
      parameters:
        - name: invoiceId
          in: path
          required: true
          schema:
            type: integer
        - name: itemId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Item deleted, returns updated invoice total
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean
                  newTotal:
                    type: number
                required:
                  - deleted
                  - newTotal
        "404":
          description: Not found

  /invoices/timeline:
    get:
      operationId: getInvoicesTimeline
      tags: [invoices]
      summary: Get purchase timeline grouped by day for a given month
      parameters:
        - name: month
          in: query
          required: false
          schema:
            type: string
          description: "Month in YYYY-MM format (defaults to current month)"
        - name: costCenterId
          in: query
          required: false
          schema:
            type: integer
          description: "Filter by cost center ID. 0 = unassigned only. Omit = all."
      responses:
        "200":
          description: Timeline data grouped by day
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceTimelineResponse"

  /invoices/calendar:
    get:
      operationId: getInvoicesCalendar
      tags: [invoices]
      summary: Get calendar heatmap data for a given month
      parameters:
        - name: month
          in: query
          required: false
          schema:
            type: string
          description: "Month in YYYY-MM format (defaults to current month)"
        - name: costCenterId
          in: query
          required: false
          schema:
            type: integer
          description: "Filter by cost center ID. 0 = unassigned only. Omit = all."
      responses:
        "200":
          description: Calendar heatmap data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceCalendarResponse"

  /invoices/payments:
    get:
      operationId: getInvoicesPayments
      tags: [invoices]
      summary: Get payments dashboard (overdue, due today, due in 7 days)
      parameters:
        - name: costCenterId
          in: query
          required: false
          schema:
            type: integer
          description: "Filter by cost center ID. 0 = unassigned only. Omit = all."
      responses:
        "200":
          description: Payments dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentsDashboard"

  /invoices/{id}/mark-paid:
    patch:
      operationId: markInvoicePaid
      tags: [invoices]
      summary: Mark an invoice as paid or unpaid
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [isPaid]
              properties:
                isPaid:
                  type: boolean
      responses:
        "200":
          description: Updated payment status
          content:
            application/json:
              schema:
                type: object
                required: [id, isPaid]
                properties:
                  id:
                    type: integer
                  isPaid:
                    type: boolean
