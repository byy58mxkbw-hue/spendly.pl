      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [excluded]
              properties:
                excluded:
                  type: boolean
      responses:
        "200":
          description: Updated invoice excluded status
          content:
            application/json:
              schema:
                type: object
                required: [id, excluded]
                properties:
                  id:
                    type: integer
                  excluded:
                    type: boolean
        "404":
          description: Not found

  /price-alerts:
    get:
      operationId: listPriceAlerts
      tags: [price-alerts]
      summary: List price alerts
      responses:
        "200":
          description: List of price alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PriceAlert"
    post:
      operationId: createPriceAlert
      tags: [price-alerts]
      summary: Create a price alert
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePriceAlertBody"
      responses:
        "201":
          description: Created alert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceAlert"

  /price-alerts/history:
    get:
      operationId: getPriceAlertsHistory
      tags: [price-alerts]
      summary: Get history of dismissed triggered alerts
      responses:
        "200":
          description: List of dismissed alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DismissedAlert"

  /price-alerts/{id}:
    patch:
      operationId: updatePriceAlert
      tags: [price-alerts]
      summary: Update a price alert (toggle active, change threshold or supplier)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePriceAlertBody"
      responses:
        "200":
          description: Updated alert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceAlert"
        "404":
          description: Not found
    delete:
      operationId: deletePriceAlert
      tags: [price-alerts]
      summary: Delete a price alert
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /price-alerts/{id}/dismiss:
    post:
      operationId: dismissPriceAlert
      tags: [price-alerts]
      summary: Dismiss a triggered alert occurrence
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DismissPriceAlertBody"
      responses:
        "201":
          description: Dismissed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DismissedAlert"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      parameters:
        - name: days
          in: query
          required: false
          schema:
            type: integer
          description: If set, summarize spend over the last N days instead of calendar month
        - name: month
          in: query
          required: false
          schema:
            type: string
          description: "Month in YYYY-MM format. If set, summarizes spend for that specific calendar month (takes priority over days)."
        - name: costCenterId
          in: query
          required: false
          schema:
            type: integer
          description: "Filter results to a specific cost center. Omit to aggregate across all cost centers."
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/food-cost-monthly:
    get:
      operationId: getFoodCostMonthly
      tags: [dashboard]
      summary: Get monthly food cost breakdown
      parameters:
        - name: months
          in: query
          required: false
          schema:
            type: integer
        - name: costCenterId
          in: query
          required: false
          schema:
            type: integer
          description: "Filter results to a specific cost center."
      responses:
        "200":
          description: Monthly food cost data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlyFoodCost"

  /dashboard/recent-purchases:
    get:
      operationId: getRecentPurchases
      tags: [dashboard]
      summary: Get recent purchases comparison
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: days
          in: query
          required: false
          schema:
            type: integer
          description: If set, only return purchases from the last N days
        - name: month
          in: query
          required: false
          schema:
            type: string
          description: "Month in YYYY-MM format (takes priority over days)"
        - name: costCenterId
          in: query
          required: false
          schema:
            type: integer
          description: "Filter results to a specific cost center."
      responses:
        "200":
          description: Recent purchases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecentPurchase"

  /reports/monthly:
    get:
      operationId: getMonthlyReport
      tags: [reports]
      summary: Get monthly purchase report with supplier breakdown
      parameters:
        - name: month
          in: query
          required: false
          description: "Month in YYYY-MM format (defaults to current month), or 'all' for all-time data"
          schema:
            type: string
        - name: costCenterId
          in: query
          required: false
          schema:
            type: integer
          description: "Filter results to a specific cost center."
      responses:
        "200":
          description: Monthly report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthlyReport"

  /reports/category-spend:
    get:
      operationId: getCategorySpend
      tags: [reports]
      summary: Get total spend per product grouped by category
      parameters:
        - name: days
          in: query
          required: false
          description: "Lookback window in days (e.g. 30 for last month). Omit for all-time data."
          schema:
            type: integer
            minimum: 1
        - name: month
          in: query
          required: false
          schema:
            type: string
          description: "Month in YYYY-MM format (takes priority over days)"
        - name: costCenterId
          in: query
          required: false
          schema:
            type: integer
          description: "Filter results to a specific cost center."
      responses:
        "200":
          description: Category spend breakdown
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategorySpendItem"

  /reports/category-spend-trend:
    get:
      operationId: getCategorySpendTrend
      tags: [reports]
      summary: Get monthly spend per category for the last N months
      parameters:
        - name: months
          in: query
          required: false
          description: "Number of months to include (default 6, max 12)"
          schema:
            type: integer
            minimum: 2
            maximum: 12
        - name: costCenterId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Monthly category spend trend
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategorySpendTrendRow"

  /reports/cost-centers:
    get:
      operationId: getReportsCostCenters
      tags: [reports]
      summary: Get spending summary grouped by cost center for a given month
      parameters:
        - name: month
          in: query
          required: false
          schema:
            type: string
          description: "Month in YYYY-MM format"
      responses:
        "200":
          description: Cost center spending report
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CostCenterReport"

  /reports/predictive:
    get:
      operationId: getPredictiveReport
      tags: [reports]
      summary: Predict next-month spend and per-product price changes based on historical trend
      parameters:
        - name: horizonDays
          in: query
          required: false
          description: "How far ahead to project unit prices (default 30 days)"
          schema:
            type: integer
            minimum: 7
            maximum: 180
      responses:
        "200":
          description: Predictive analytics report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PredictiveReport"

  /ksef/config:
    get:
      operationId: getKsefConfig
      tags: [ksef]
      summary: Get current KSeF configuration (masked token)
      responses:
        "200":
          description: KSeF config or null if not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KsefConfigView"
    put:
      operationId: updateKsefConfig
      tags: [ksef]
      summary: Save/update KSeF NIP and authorization token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateKsefConfigBody"
      responses:
        "200":
          description: Updated config (masked)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KsefConfigView"

  /ksef/config/sync-from-date:
    put:
      operationId: updateKsefSyncFromDate
      tags: [ksef]
      summary: Update the start date for full KSeF sync
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateKsefSyncFromDateBody"
      responses:
        "200":
          description: Updated config (masked)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KsefConfigView"
        "400":
          description: Invalid date format or KSeF not configured

  /ksef/sync:
    post:
      operationId: syncKsefInvoices
      tags: [ksef]
      summary: Pull new buyer invoices from KSeF for the configured NIP
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncKsefInvoicesBody"
      responses:
        "200":
          description: Sync summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KsefSyncResult"
        "400":
          description: KSeF not configured
        "401":
          description: Token rejected by KSeF
        "502":
          description: KSeF upstream error

  /ksef/pending/retry:
    post:
      operationId: retryKsefPending
      tags: [ksef]
      summary: Retry auto-import of pending KSeF invoices after new supplier/product was added
      responses:
        "200":
          description: Retry result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetryKsefPendingResult"

  /ksef/pending/delete-all:
    delete:
      operationId: deleteAllKsefPending
      tags: [ksef]
      summary: Delete all pending KSeF invoices for the current user
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, accepted, rejected]
      responses:
        "200":
          description: Number of deleted pending invoices
          content:
            application/json:
              schema:
                type: object
                required: [deleted]
                properties:
                  deleted:
                    type: integer

  /ksef/pending:
    get:
      operationId: listKsefPending
      tags: [ksef]
      summary: List invoices pulled from KSeF that need manual review
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, accepted, rejected]
      responses:
        "200":
          description: Pending invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KsefPendingInvoiceSummary"

  /ksef/pending/{id}:
    get:
      operationId: getKsefPending
      tags: [ksef]
      summary: Get one pending invoice with parsed items and matching suggestions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pending invoice detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KsefPendingInvoiceDetail"
        "404":
          description: Not found
    delete:
      operationId: deleteKsefPending
      tags: [ksef]
      summary: Delete a single pending KSeF invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                type: object
                required: [deleted]
                properties:
                  deleted:
                    type: boolean
        "404":
          description: Not found

  /ksef/pending/{id}/accept:
    post:
      operationId: acceptKsefPending
      tags: [ksef]
      summary: Accept a pending invoice with user-provided supplier / product mapping
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptKsefPendingBody"
      responses:
        "200":
          description: Created invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceWithItems"
        "404":
          description: Not found
        "409":
          description: Already accepted or invoice already exists

  /ksef/pending/{id}/reject:
    post:
      operationId: rejectKsefPending
      tags: [ksef]
      summary: Mark a pending invoice as rejected (kept for audit)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Rejected

  /dashboard/active-alerts:
    get:
      operationId: getDashboardActiveAlerts
      tags: [dashboard]
      summary: Get triggered price alerts for dashboard
      responses:
        "200":
          description: Active triggered alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TriggeredAlert"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    CostCenter:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: string
        name:
          type: string
        color:
          type: string
        invoiceCount:
          type: integer
        supplierCount:
          type: integer
      required:
        - id
        - userId
        - name
        - color
        - invoiceCount
        - supplierCount

    CreateCostCenterBody:
      type: object
      properties:
        name:
          type: string
        color:
          type: string
      required:
        - name

    UpdateCostCenterBody:
      type: object
      properties:
        name:
          type: string
        color:
          type: string

    SetInvoiceCostCenterBody:
      type: object
      properties:
        costCenterId:
          type: ["integer", "null"]
      required:
        - costCenterId

    SetSupplierDefaultCostCenterBody:
      type: object
      properties:
        defaultCostCenterId:
          type: ["integer", "null"]
      required:
        - defaultCostCenterId

    SetSupplierDefaultCategoryBody:
      type: object
      properties:
        defaultCategory:
          type: ["string", "null"]
      required:
        - defaultCategory

    Supplier:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        taxId:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        isActive:
          type: boolean
        defaultCostCenterId:
          type: ["integer", "null"]
        defaultCostCenterName:
          type: ["string", "null"]
        defaultCostCenterColor:
          type: ["string", "null"]
        defaultCategory:
          type: ["string", "null"]
        invoiceCount:
          type: integer
        lastInvoiceDate:
          type: ["string", "null"]
        totalSpend:
          type: ["number", "null"]
        createdAt:
          type: string
      required:
        - id
        - name
        - taxId
        - isActive
        - invoiceCount
        - createdAt

    CreateSupplierBody:
      type: object
      properties:
        name:
          type: string
        taxId:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
      required:
        - name
        - taxId

    UpdateSupplierBody:
      type: object
      properties:
        name:
          type: string
        taxId:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        isActive:
          type: boolean
        defaultCategory:
          type: ["string", "null"]

    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        unit:
          type: string
        category:
          type: ["string", "null"]
        subcategory:
          type: ["string", "null"]
        classificationConfidence:
          type: ["number", "null"]
        canonicalName:
          type: ["string", "null"]
        needsReview:
          type: boolean
        latestPrice:
          type: ["number", "null"]
        previousPrice:
          type: ["number", "null"]
        priceChangePercent:
          type: ["number", "null"]
        supplierId:
          type: ["integer", "null"]
        supplierName:
          type: ["string", "null"]
        lastPurchaseDate:
          type: ["string", "null"]
        supplierCount:
          type: integer
        totalQuantity:
          type: ["number", "null"]
      required:
        - id
        - name
        - unit
        - needsReview

    CreateProductBody:
      type: object
      properties:
        name:
          type: string
        unit:
          type: string
      required:
        - name

    CreatedProduct:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        unit:
          type: string
        category:
          type: ["string", "null"]
      required:
        - id
        - name
        - unit

    UpdateProductBody:
      type: object
