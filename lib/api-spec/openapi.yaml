openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: KSeF Monitor Cen - API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: suppliers
    description: Supplier management
  - name: products
    description: Product management
  - name: invoices
    description: Invoice management
  - name: price-alerts
    description: Price alert management
  - name: dashboard
    description: Dashboard summaries
  - name: reports
    description: Reporting and exports
  - name: ksef
    description: KSeF 2.0 integration (sync, config, pending review)
  - name: product-groups
    description: Product grouping (variants under one umbrella name)

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /suppliers:
    get:
      operationId: listSuppliers
      tags: [suppliers]
      summary: List all suppliers
      responses:
        "200":
          description: List of suppliers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Supplier"
    post:
      operationId: createSupplier
      tags: [suppliers]
      summary: Create a new supplier
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupplierBody"
      responses:
        "201":
          description: Created supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"

  /suppliers/{id}:
    get:
      operationId: getSupplier
      tags: [suppliers]
      summary: Get a supplier by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Supplier details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
        "404":
          description: Not found
    put:
      operationId: updateSupplier
      tags: [suppliers]
      summary: Update a supplier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSupplierBody"
      responses:
        "200":
          description: Updated supplier
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Supplier"
        "404":
          description: Not found
    delete:
      operationId: deleteSupplier
      tags: [suppliers]
      summary: Delete a supplier
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /products:
    get:
      operationId: listProducts
      tags: [products]
      summary: List all products
      parameters:
        - name: supplierId
          in: query
          required: false
          schema:
            type: integer
        - name: category
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /products/{id}:
    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update a product (e.g. its category)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductBody"
      responses:
        "204":
          description: Updated
        "404":
          description: Not found

  /products/{id}/supplier-comparison:
    get:
      operationId: getProductSupplierComparison
      tags: [products]
      summary: Compare prices across suppliers for a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Supplier comparison data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupplierComparison"
        "404":
          description: Not found

  /products/{id}/price-history:
    get:
      operationId: getProductPriceHistory
      tags: [products]
      summary: Get price history for a product
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: supplierId
          in: query
          required: false
          schema:
            type: integer
        - name: months
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Price history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PriceHistoryEntry"

  /products/top-price-changes:
    get:
      operationId: getTopPriceChanges
      tags: [products]
      summary: Get products with biggest price changes
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: days
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Top price change products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PriceChangeProduct"

  /invoices:
    get:
      operationId: listInvoices
      tags: [invoices]
      summary: List all invoices
      parameters:
        - name: supplierId
          in: query
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: offset
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invoice"

  /invoices/import:
    post:
      operationId: importInvoice
      tags: [invoices]
      summary: Import invoice from KSeF XML
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportInvoiceBody"
      responses:
        "201":
          description: Imported invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceWithItems"

  /invoices/{id}:
    get:
      operationId: getInvoice
      tags: [invoices]
      summary: Get invoice details with items
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Invoice with line items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceWithItems"
        "404":
          description: Not found
    delete:
      operationId: deleteInvoice
      tags: [invoices]
      summary: Delete an invoice
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /product-groups:
    get:
      operationId: listProductGroups
      tags: [product-groups]
      summary: List all product groups with aggregate stats
      responses:
        "200":
          description: List of product groups
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductGroup"
    post:
      operationId: createProductGroup
      tags: [product-groups]
      summary: Create a new (empty or pre-populated) product group
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductGroupBody"
      responses:
        "201":
          description: Created group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductGroup"

  /product-groups/suggestions:
    get:
      operationId: getProductGroupSuggestions
      tags: [product-groups]
      summary: Get suggested groups (ungrouped products clustered by first words of name)
      responses:
        "200":
          description: Suggestions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductGroupSuggestion"

  /product-groups/suggestions/accept:
    post:
      operationId: acceptProductGroupSuggestion
      tags: [product-groups]
      summary: Accept a suggestion — create the group and attach products
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptSuggestionBody"
      responses:
        "201":
          description: Created group
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductGroup"

  /product-groups/suggestions/reject:
    post:
      operationId: rejectProductGroupSuggestion
      tags: [product-groups]
      summary: Reject a suggestion so it won't be proposed again
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectSuggestionBody"
      responses:
        "204":
          description: Rejected

  /product-groups/{id}:
    get:
      operationId: getProductGroupDetail
      tags: [product-groups]
      summary: Get product group detail with variants and price history
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Group detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductGroupDetail"
        "404":
          description: Not found
    patch:
      operationId: updateProductGroup
      tags: [product-groups]
      summary: Rename a product group
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductGroupBody"
      responses:
        "204":
          description: Updated
    delete:
      operationId: deleteProductGroup
      tags: [product-groups]
      summary: Delete a product group (variants become ungrouped)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /product-groups/{id}/products:
    post:
      operationId: addProductsToGroup
      tags: [product-groups]
      summary: Attach products to a group
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddProductsToGroupBody"
      responses:
        "204":
          description: Attached

  /product-groups/{id}/products/{productId}:
    delete:
      operationId: removeProductFromGroup
      tags: [product-groups]
      summary: Remove a product from a group
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: productId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  /price-alerts:
    get:
      operationId: listPriceAlerts
      tags: [price-alerts]
      summary: List price alerts
      responses:
        "200":
          description: List of price alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PriceAlert"
    post:
      operationId: createPriceAlert
      tags: [price-alerts]
      summary: Create a price alert
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePriceAlertBody"
      responses:
        "201":
          description: Created alert
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceAlert"

  /price-alerts/{id}:
    delete:
      operationId: deletePriceAlert
      tags: [price-alerts]
      summary: Delete a price alert
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/food-cost-monthly:
    get:
      operationId: getFoodCostMonthly
      tags: [dashboard]
      summary: Get monthly food cost breakdown
      parameters:
        - name: months
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Monthly food cost data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlyFoodCost"

  /dashboard/recent-purchases:
    get:
      operationId: getRecentPurchases
      tags: [dashboard]
      summary: Get recent purchases comparison
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Recent purchases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RecentPurchase"

  /reports/monthly:
    get:
      operationId: getMonthlyReport
      tags: [reports]
      summary: Get monthly purchase report with supplier breakdown
      parameters:
        - name: month
          in: query
          required: false
          description: "Month in YYYY-MM format (defaults to current month)"
          schema:
            type: string
      responses:
        "200":
          description: Monthly report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MonthlyReport"

  /reports/predictive:
    get:
      operationId: getPredictiveReport
      tags: [reports]
      summary: Predict next-month spend and per-product price changes based on historical trend
      parameters:
        - name: horizonDays
          in: query
          required: false
          description: "How far ahead to project unit prices (default 30 days)"
          schema:
            type: integer
            minimum: 7
            maximum: 180
      responses:
        "200":
          description: Predictive analytics report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PredictiveReport"

  /ksef/config:
    get:
      operationId: getKsefConfig
      tags: [ksef]
      summary: Get current KSeF configuration (masked token)
      responses:
        "200":
          description: KSeF config or null if not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KsefConfigView"
    put:
      operationId: updateKsefConfig
      tags: [ksef]
      summary: Save/update KSeF NIP and authorization token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateKsefConfigBody"
      responses:
        "200":
          description: Updated config (masked)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KsefConfigView"

  /ksef/sync:
    post:
      operationId: syncKsefInvoices
      tags: [ksef]
      summary: Pull new buyer invoices from KSeF for the configured NIP
      responses:
        "200":
          description: Sync summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KsefSyncResult"
        "400":
          description: KSeF not configured
        "401":
          description: Token rejected by KSeF
        "502":
          description: KSeF upstream error

  /ksef/pending:
    get:
      operationId: listKsefPending
      tags: [ksef]
      summary: List invoices pulled from KSeF that need manual review
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, accepted, rejected]
      responses:
        "200":
          description: Pending invoices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KsefPendingInvoiceSummary"

  /ksef/pending/{id}:
    get:
      operationId: getKsefPending
      tags: [ksef]
      summary: Get one pending invoice with parsed items and matching suggestions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Pending invoice detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KsefPendingInvoiceDetail"
        "404":
          description: Not found

  /ksef/pending/{id}/accept:
    post:
      operationId: acceptKsefPending
      tags: [ksef]
      summary: Accept a pending invoice with user-provided supplier / product mapping
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AcceptKsefPendingBody"
      responses:
        "200":
          description: Created invoice
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvoiceWithItems"
        "404":
          description: Not found
        "409":
          description: Already accepted or invoice already exists

  /ksef/pending/{id}/reject:
    post:
      operationId: rejectKsefPending
      tags: [ksef]
      summary: Mark a pending invoice as rejected (kept for audit)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Rejected

  /dashboard/active-alerts:
    get:
      operationId: getDashboardActiveAlerts
      tags: [dashboard]
      summary: Get triggered price alerts for dashboard
      responses:
        "200":
          description: Active triggered alerts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TriggeredAlert"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Supplier:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        taxId:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        isActive:
          type: boolean
        invoiceCount:
          type: integer
        lastInvoiceDate:
          type: ["string", "null"]
        totalSpend:
          type: ["number", "null"]
        createdAt:
          type: string
      required:
        - id
        - name
        - taxId
        - isActive
        - invoiceCount
        - createdAt

    CreateSupplierBody:
      type: object
      properties:
        name:
          type: string
        taxId:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
      required:
        - name
        - taxId

    UpdateSupplierBody:
      type: object
      properties:
        name:
          type: string
        taxId:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        isActive:
          type: boolean

    Product:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        unit:
          type: string
        category:
          type: ["string", "null"]
        latestPrice:
          type: ["number", "null"]
        previousPrice:
          type: ["number", "null"]
        priceChangePercent:
          type: ["number", "null"]
        supplierId:
          type: ["integer", "null"]
        supplierName:
          type: ["string", "null"]
        lastPurchaseDate:
          type: ["string", "null"]
        supplierCount:
          type: integer
      required:
        - id
        - name
        - unit

    UpdateProductBody:
      type: object
      properties:
        category:
          type: ["string", "null"]

    SupplierComparisonPricePoint:
      type: object
      properties:
        date:
          type: string
        price:
          type: number
      required:
        - date
        - price

    SupplierComparisonEntry:
      type: object
      properties:
        supplierId:
          type: integer
        supplierName:
          type: string
        latestPrice:
          type: number
        avgPrice:
          type: number
        minPrice:
          type: number
        maxPrice:
          type: number
        purchaseCount:
          type: integer
        lastPurchaseDate:
          type: string
        priceHistory:
          type: array
          items:
            $ref: "#/components/schemas/SupplierComparisonPricePoint"
      required:
        - supplierId
        - supplierName
        - latestPrice
        - avgPrice
        - minPrice
        - maxPrice
        - purchaseCount
        - lastPurchaseDate
        - priceHistory

    SupplierComparison:
      type: object
      properties:
        productId:
          type: integer
        productName:
          type: string
        unit:
          type: string
        supplierCount:
          type: integer
        suppliers:
          type: array
          items:
            $ref: "#/components/schemas/SupplierComparisonEntry"
      required:
        - productId
        - productName
        - unit
        - supplierCount
        - suppliers

    PriceHistoryEntry:
      type: object
      properties:
        date:
          type: string
        price:
          type: number
        invoiceId:
          type: integer
        invoiceNumber:
          type: string
        supplierId:
          type: integer
        supplierName:
          type: string
      required:
        - date
        - price
        - invoiceId
        - invoiceNumber
        - supplierId
        - supplierName

    PriceChangeProduct:
      type: object
      properties:
        productId:
          type: integer
        productName:
          type: string
        unit:
          type: string
        currentPrice:
          type: number
        previousPrice:
          type: number
        changePercent:
          type: number
        changeDirection:
          type: string
          enum: [up, down]
        supplierName:
          type: string
        lastDate:
          type: string
      required:
        - productId
        - productName
        - unit
        - currentPrice
        - previousPrice
        - changePercent
        - changeDirection
        - supplierName
        - lastDate

    Invoice:
      type: object
      properties:
        id:
          type: integer
        supplierId:
          type: integer
        supplierName:
          type: string
        invoiceNumber:
          type: string
        invoiceDate:
          type: string
        totalAmount:
          type: number
        itemCount:
          type: integer
        importedAt:
          type: string
      required:
        - id
        - supplierId
        - supplierName
        - invoiceNumber
        - invoiceDate
        - totalAmount
        - itemCount
        - importedAt

    InvoiceItem:
      type: object
      properties:
        id:
          type: integer
        invoiceId:
          type: integer
        productId:
          type: ["integer", "null"]
        productName:
          type: string
        quantity:
          type: number
        unit:
          type: string
        unitPrice:
          type: number
        totalPrice:
          type: number
        vatRate:
          type: ["number", "null"]
      required:
        - id
        - invoiceId
        - productName
        - quantity
        - unit
        - unitPrice
        - totalPrice

    InvoiceWithItems:
      type: object
      properties:
        id:
          type: integer
        supplierId:
          type: integer
        supplierName:
          type: string
        invoiceNumber:
          type: string
        invoiceDate:
          type: string
        totalAmount:
          type: number
        importedAt:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/InvoiceItem"
      required:
        - id
        - supplierId
        - supplierName
        - invoiceNumber
        - invoiceDate
        - totalAmount
        - importedAt
        - items

    ImportInvoiceBody:
      type: object
      properties:
        supplierId:
          type: integer
        xmlContent:
          type: string
        invoiceNumber:
          type: string
        invoiceDate:
          type: string
        force:
          type: boolean
          description: If true, skip duplicate detection and create the invoice even if one with the same number already exists.
      required:
        - supplierId
        - invoiceDate

    PriceAlert:
      type: object
      properties:
        id:
          type: integer
        productName:
          type: ["string", "null"]
        groupId:
          type: ["integer", "null"]
        groupName:
          type: ["string", "null"]
        supplierId:
          type: ["integer", "null"]
        supplierName:
          type: ["string", "null"]
        thresholdPercent:
          type: number
        isActive:
          type: boolean
        createdAt:
          type: string
      required:
        - id
