name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: pass
          POSTGRES_DB: spendly_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U user -d spendly_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      # Schemat do testowej bazy (serwis postgres powyżej). push-force = nieinteraktywnie.
      - name: Push DB schema (test)
        run: pnpm --filter @workspace/db run push-force
        env:
          DATABASE_URL: postgres://user:pass@localhost:5432/spendly_test

      # TEST_DATABASE_URL odblokowuje testy DB-zależne (izolacja tenantów).
      # Lokalnie bez tej zmiennej te testy się pomijają — `pnpm test` zostaje zielony.
      - name: Test
        run: pnpm test
        env:
          TEST_DATABASE_URL: postgres://user:pass@localhost:5432/spendly_test
